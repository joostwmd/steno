# Publishes @joostwmd/steno to the npm registry.
#
# Option A — Classic token: add repository secret NPM_TOKEN (Automation token from npmjs.com).
# Option B — OIDC: configure this repo as a Trusted Publisher on npm for @joostwmd/steno,
#   then switch this workflow to use npm's OIDC flow (see https://docs.npmjs.com/trusted-publishers).
#
name: Publish @joostwmd/steno

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build installable package
        run: pnpm --filter @joostwmd/steno build

      - name: Publish to npm
        run: pnpm publish --filter @joostwmd/steno --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
